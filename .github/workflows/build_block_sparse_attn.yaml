name: Build Block-Sparse Attention

on:
  push:
  workflow_dispatch:
    inputs:
      cuda_archs:
        description: 'Semicolon-separated CUDA arch list (e.g. "80;86;89;90" or leave empty for auto-detect)'
        required: false
        default: '80;89;90;100;120'
      upload-to-release:
        description: "Upload wheel to a GitHub release"
        required: false
        type: boolean
        default: true

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Build wheel in CUDA container
        env:
          BLOCK_SPARSE_ATTN_CUDA_ARCHS: ${{ github.event_name == 'workflow_dispatch' && inputs.cuda_archs || '' }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            -e BLOCK_SPARSE_ATTN_CUDA_ARCHS \
            -e BSA_CLONE_DIR="${{ github.workspace }}/Block-Sparse-Attention" \
            nvidia/cuda:13.0.2-devel-ubuntu24.04 \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                bash \
                build-essential \
                ca-certificates \
                curl \
                git \
                python3.12 \
                python3.12-dev \
                python3.12-venv
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="/root/.local/bin:$PATH"
              uv sync --python 3.12
              bash scripts/build_block_sparse_attn.sh
            '

      - name: Find wheels
        run: |
          wheels=$(ls ${{ github.workspace }}/Block-Sparse-Attention/dist/block_sparse_attn-*.whl 2>/dev/null)
          if [ -z "$wheels" ]; then
            echo "Failed to find any wheels."
            exit 1
          fi
          echo "Found wheels:"
          echo "$wheels"
          wheel_path=$(echo "$wheels" | head -n1)
          echo "wheel_path=${wheel_path}" >> $GITHUB_ENV
          echo "wheel_name=$(basename ${wheel_path})" >> $GITHUB_ENV

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: block-sparse-attn-wheel
          path: ${{ env.wheel_path }}

  release:
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.upload-to-release)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: block-sparse-attn-wheel
          path: dist

      - name: Resolve release asset
        run: |
          wheel_path=$(ls dist/block_sparse_attn-*.whl 2>/dev/null | head -n1)
          if [ -z "$wheel_path" ]; then
            echo "Failed to find downloaded wheel artifact."
            exit 1
          fi
          echo "wheel_path=${wheel_path}" >> $GITHUB_ENV
          echo "wheel_name=$(basename ${wheel_path})" >> $GITHUB_ENV

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build_block_sparse_attn-${{ github.sha }}
          release_name: Build Block-Sparse Attention Wheels (${{ github.sha }})
          commitish: ${{ github.sha }}
          prerelease: true

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.wheel_path }}
          asset_name: ${{ env.wheel_name }}
          asset_content_type: application/octet-stream
