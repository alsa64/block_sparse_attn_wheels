name: Build Attention Wheels

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  workflow_dispatch:
    inputs:
      cuda_archs:
        description: 'Semicolon-separated CUDA arch list (e.g. "80;86;89;90" or leave empty for auto-detect)'
        required: false
        default: '80;89;90;100;120'
      upload-to-release:
        description: "Upload wheel to a GitHub release"
        required: false
        type: boolean
        default: true

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

jobs:
  build-wheel:
    runs-on: ubuntu-24.04
    continue-on-error: true
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: block_sparse_attn
            script: block_sparse_attn
            clone_dir: Block-Sparse-Attention
          - package: sageattention
            script: sageattention
            clone_dir: SageAttention
          - package: flash_attn
            script: flash_attn
            clone_dir: flash-attention

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          clean: false

      - name: Build ${{ matrix.package }} wheel in CUDA container
        env:
          ATTN_CUDA_ARCHS: ${{ github.event_name == 'workflow_dispatch' && inputs.cuda_archs || '' }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            -e ATTN_CUDA_ARCHS \
            -e BSA_CLONE_DIR="${{ github.workspace }}/Block-Sparse-Attention" \
            -e SAGEATTENTION_CLONE_DIR="${{ github.workspace }}/SageAttention" \
            -e FLASH_ATTN_CLONE_DIR="${{ github.workspace }}/flash-attention" \
            nvidia/cuda:13.0.2-devel-ubuntu24.04 \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                bash \
                build-essential \
                ca-certificates \
                curl \
                git \
                python3.12 \
                python3.12-dev \
                python3.12-venv
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="/root/.local/bin:$PATH"
              export UV_LINK_MODE=copy
              uv sync --python 3.12
              bash scripts/build_attention_wheel.sh "${{ matrix.script }}"
            '

      - name: Collect ${{ matrix.package }} wheels
        if: always()
        run: |
          mkdir -p dist
          if ls "${{ github.workspace }}/${{ matrix.clone_dir }}/dist"/*.whl >/dev/null 2>&1; then
            cp "${{ github.workspace }}/${{ matrix.clone_dir }}/dist"/*.whl dist/
          fi

          wheels=$(ls dist/*.whl 2>/dev/null)
          if [ -z "$wheels" ]; then
            echo "No wheels collected for ${{ matrix.package }}"
            exit 1
          fi

          echo "Collected wheels for ${{ matrix.package }}:"
          echo "$wheels"

      - name: Upload ${{ matrix.package }} wheel artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: attention-wheel-${{ matrix.package }}
          path: dist/*.whl
          if-no-files-found: ignore

  release:
    needs: build-wheel
    if: always() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.upload-to-release))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: attention-wheel-*
          path: dist
          merge-multiple: true

      - name: Check release assets
        run: |
          wheels=$(ls dist/*.whl 2>/dev/null)
          if [ -z "$wheels" ]; then
            echo "Failed to find downloaded wheel artifacts"
            exit 1
          fi

      - name: Create release and upload wheels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="build_attention_wheels-${GITHUB_SHA}"
          gh release create "$tag" dist/*.whl \
            --target "$GITHUB_SHA" \
            --title "Build Attention Wheels ($GITHUB_SHA)" \
            --prerelease
