name: Build Attention Wheels

on:
  push:
  workflow_dispatch:
    inputs:
      cuda_archs:
        description: 'Semicolon-separated CUDA arch list (e.g. "80;86;89;90" or leave empty for auto-detect)'
        required: false
        default: '80;89;90;100;120'
      upload-to-release:
        description: "Upload wheel to a GitHub release"
        required: false
        type: boolean
        default: true

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Build wheel in CUDA container
        env:
          ATTN_CUDA_ARCHS: ${{ github.event_name == 'workflow_dispatch' && inputs.cuda_archs || '' }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            -e ATTN_CUDA_ARCHS \
            -e BSA_CLONE_DIR="${{ github.workspace }}/Block-Sparse-Attention" \
            -e SAGEATTENTION_CLONE_DIR="${{ github.workspace }}/SageAttention" \
            -e FLASH_ATTN_CLONE_DIR="${{ github.workspace }}/flash-attention" \
            nvidia/cuda:13.0.2-devel-ubuntu24.04 \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                bash \
                build-essential \
                ca-certificates \
                curl \
                git \
                python3.12 \
                python3.12-dev \
                python3.12-venv
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="/root/.local/bin:$PATH"
              uv sync --python 3.12
              bash scripts/build_block_sparse_attn.sh
              bash scripts/build_sageattention.sh
              bash scripts/build_flash_attn.sh
            '

      - name: Collect wheels
        run: |
          mkdir -p dist
          cp ${{ github.workspace }}/Block-Sparse-Attention/dist/*.whl dist/
          cp ${{ github.workspace }}/SageAttention/dist/*.whl dist/
          cp ${{ github.workspace }}/flash-attention/dist/*.whl dist/

          wheels=$(ls dist/*.whl 2>/dev/null)
          if [ -z "$wheels" ]; then
            echo "Failed to find any wheels"
            exit 1
          fi

          echo "Collected wheels:"
          echo "$wheels"

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: attention-wheels
          path: dist/*.whl

  release:
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.upload-to-release)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: attention-wheels
          path: dist

      - name: Check release assets
        run: |
          wheels=$(ls dist/*.whl 2>/dev/null)
          if [ -z "$wheels" ]; then
            echo "Failed to find downloaded wheel artifacts"
            exit 1
          fi

      - name: Create release and upload wheels
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build_attention_wheels-${{ github.sha }}
          name: Build Attention Wheels (${{ github.sha }})
          target_commitish: ${{ github.sha }}
          prerelease: true
          files: dist/*.whl
